services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - FIRESTORE_COLLECTION=items
      - GOOGLE_CLOUD_PROJECT=local-dev
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      - BACKEND_BASE_URL=http://backend:8080
    ports:
      - "8081:8080"
    depends_on:
      - backend
